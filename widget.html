<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>💰 記帳本 Widget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, #0f2017 0%, #1b4332 55%, #2d6a4f 100%);
  color: #fff;
  overflow: hidden;
}

.widget {
  width: 100%; height: 100%;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  overflow: hidden;
}

/* 背景裝飾 */
.widget::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  pointer-events: none;
}

/* Header */
.w-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.w-title { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
.w-month { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.35); }

/* 總餘額 */
.w-balance-label { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 0.5px; }
.w-balance {
  font-family: 'DM Mono', monospace;
  font-size: 32px; font-weight: 500;
  color: #fff; letter-spacing: -1px; line-height: 1;
}
.w-balance.neg { color: #ff8fa3; }

/* 收入支出 */
.w-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.w-stat {
  background: rgba(255,255,255,0.09);
  border-radius: 10px; padding: 8px 10px;
  border: 1px solid rgba(255,255,255,0.06);
}
.w-stat-label { font-size: 9px; color: rgba(255,255,255,0.4); margin-bottom: 3px; }
.w-stat-val { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
.w-stat-val.income { color: #95d5b2; }
.w-stat-val.expense { color: #ff8fa3; }

/* 帳戶 */
.w-accounts-label { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; }
.w-account {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 11px;
}
.w-account:last-child { border-bottom: none; }
.w-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.w-aname { flex: 1; color: rgba(255,255,255,0.6); }
.w-abal { font-family: 'DM Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.85); }
.w-abal.neg { color: #ff8fa3; }

/* Footer */
.w-footer {
  margin-top: auto;
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.07);
}
.w-time { font-size: 9px; color: rgba(255,255,255,0.25); font-family: 'DM Mono', monospace; }
.w-btn {
  font-size: 9px; color: rgba(255,255,255,0.35);
  background: none; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 99px; padding: 2px 8px; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
}

/* 狀態訊息 */
.w-msg { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; padding: 20px 0; }
.w-err { font-size: 11px; color: #ff8fa3; text-align: center; padding: 12px 0; line-height: 1.6; }

/* 設定面板 */
.cfg-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  padding: 16px; z-index: 999;
}
.cfg-box {
  background: #1a1a1a; border: 1px solid #333;
  border-radius: 14px; padding: 20px; width: 100%;
}
.cfg-box h2 { font-size: 14px; color: #fff; margin-bottom: 14px; font-weight: 700; }
.cfg-label { font-size: 10px; color: #888; margin-bottom: 3px; display: block; }
.cfg-input {
  width: 100%; background: #0f0f0f; border: 1px solid #333;
  border-radius: 7px; padding: 8px 10px; color: #fff; font-size: 12px;
  margin-bottom: 10px; font-family: 'DM Mono', monospace;
}
.cfg-input:focus { outline: none; border-color: #52b788; }
.cfg-btns { display: flex; gap: 8px; }
.cfg-btn {
  flex: 1; padding: 9px; border: none; border-radius: 7px;
  font-size: 12px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; font-weight: 500;
}
.cfg-btn.ok { background: #2d6a4f; color: #fff; }
.cfg-btn.cancel { background: #2a2a2a; color: #888; border: 1px solid #333; }
</style>
</head>
<body>

<div class="widget">
  <div class="w-header">
    <div class="w-title">💰 記帳本</div>
    <div class="w-month" id="w-month"></div>
  </div>

  <div id="w-body">
    <div class="w-msg">載入中…</div>
  </div>

  <div class="w-footer">
    <div class="w-time" id="w-time">--</div>
    <div style="display:flex;gap:6px">
      <button class="w-btn" onclick="loadData()">🔄</button>
      <button class="w-btn" onclick="openCfg()">⚙️</button>
    </div>
  </div>
</div>

<!-- 設定面板 -->
<div class="cfg-overlay" id="cfg" style="display:none">
  <div class="cfg-box">
    <h2>⚙️ 設定</h2>
    <label class="cfg-label">Apps Script 網址</label>
    <input class="cfg-input" id="cfg-url" placeholder="https://script.google.com/...">
    <label class="cfg-label">密鑰</label>
    <input class="cfg-input" id="cfg-key" placeholder="my_secret_123" type="password">
    <div class="cfg-btns">
      <button class="cfg-btn cancel" onclick="closeCfg()">取消</button>
      <button class="cfg-btn ok" onclick="saveCfg()">儲存</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_FX = { TWD:1, USD:32.5, JPY:0.22, EUR:35, CNY:4.5, HKD:4.1, KRW:0.024, GBP:41, AUD:21, SGD:24 };

const now = new Date();
document.getElementById('w-month').textContent =
  now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0');

function fmt(n){ return (n<0?'-':'')+'$'+Math.abs(Math.round(n)).toLocaleString('zh-TW'); }
function thisMonth(){ return now.toISOString().slice(0,7); }

function getCfg(){ return { url: localStorage.getItem('wgt_url')||'', key: localStorage.getItem('wgt_key')||'' }; }
function openCfg(){
  const c = getCfg();
  document.getElementById('cfg-url').value = c.url;
  document.getElementById('cfg-key').value = c.key;
  document.getElementById('cfg').style.display = 'flex';
}
function closeCfg(){ document.getElementById('cfg').style.display = 'none'; }
function saveCfg(){
  localStorage.setItem('wgt_url', document.getElementById('cfg-url').value.trim());
  localStorage.setItem('wgt_key', document.getElementById('cfg-key').value.trim());
  closeCfg(); loadData();
}

function calcStats(state){
  const month = thisMonth();
  const txs = state.transactions || [];
  const fx = state.fxRates || DEFAULT_FX;
  function toTWD(a, c){ return a * (fx[c] || DEFAULT_FX[c] || 1); }

  let income = 0, expense = 0;
  txs.forEach(t => {
    if(!t.date.startsWith(month)) return;
    if(t.type==='income')  income  += toTWD(t.amount, t.currency||'TWD');
    if(t.type==='expense') expense += toTWD(t.amount, t.currency||'TWD');
  });

  let total = 0;
  const accs = (state.accounts||[]).filter(a=>!a.excluded);
  accs.forEach(a => {
    txs.forEach(t => {
      if(t.accountId!==a.id) return;
      total += t.type==='income' ? toTWD(t.amount, t.currency||'TWD') : -toTWD(t.amount, t.currency||'TWD');
    });
  });

  const accBals = (state.accounts||[]).map(a => {
    let bal = txs.reduce((s,t) => {
      if(t.accountId!==a.id) return s;
      return s + (t.type==='income' ? t.amount : -t.amount);
    }, 0);
    return { name: a.name, color: a.color, balance: bal, excluded: a.excluded };
  });

  return { income, expense, total, accBals };
}

function render(state){
  const { income, expense, total, accBals } = calcStats(state);
  const accsHtml = accBals.map(a => `
    <div class="w-account">
      <div class="w-dot" style="background:${a.color}"></div>
      <div class="w-aname">${a.name}${a.excluded?' <span style="opacity:.4;font-size:9px">(排除)</span>':''}</div>
      <div class="w-abal${a.balance<0?' neg':''}">${fmt(a.balance)}</div>
    </div>`).join('');

  document.getElementById('w-body').innerHTML = `
    <div>
      <div class="w-balance-label">總餘額（TWD）</div>
      <div class="w-balance${total<0?' neg':''}">${fmt(total)}</div>
    </div>
    <div class="w-stats">
      <div class="w-stat">
        <div class="w-stat-label">▲ 本月收入</div>
        <div class="w-stat-val income">${fmt(income)}</div>
      </div>
      <div class="w-stat">
        <div class="w-stat-label">▼ 本月支出</div>
        <div class="w-stat-val expense">${fmt(expense)}</div>
      </div>
    </div>
    <div class="w-accounts-label">各帳戶餘額</div>
    <div>${accsHtml}</div>
  `;
  document.getElementById('w-time').textContent = '更新 ' + new Date().toLocaleTimeString('zh-TW');
}

async function loadData(){
  const cfg = getCfg();
  if(!cfg.url){
    document.getElementById('w-body').innerHTML =
      '<div class="w-err">尚未設定<br>點右下 ⚙️ 填入網址與密鑰</div>';
    return;
  }
  document.getElementById('w-body').innerHTML = '<div class="w-msg">🔄 載入中…</div>';
  try {
    const ts = Date.now();
    const res = await fetch(cfg.url + '?key=' + encodeURIComponent(cfg.key) + '&ts=' + ts);
    const json = await res.json();
    if(json.ok && json.data){ render(JSON.parse(json.data)); }
    else if(!json.data){ document.getElementById('w-body').innerHTML = '<div class="w-err">雲端尚無資料<br>請先在主記帳本上傳</div>'; }
    else { document.getElementById('w-body').innerHTML = '<div class="w-err">❌ '+(json.error||'失敗')+'</div>'; }
  } catch(e){
    document.getElementById('w-body').innerHTML = '<div class="w-err">❌ 網路錯誤<br>'+e.message+'</div>';
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
